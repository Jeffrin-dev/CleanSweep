# CleanSweep CI
#
# Three jobs run on every push and pull request to main, release/v3, and dev.
#
#   integrity   — architecture gate: no print() leaks, no circular imports,
#                 version string consistent across version.py and CHANGELOG.md
#
#   test        — full 838-test suite on Python 3.10, 3.11, and 3.12
#                 (standard library only — no pip install, no virtualenv)
#
#   stress      — memory and scale tests at 100K files
#                 runs on dev and main only (expensive; not on every PR)
#
# All jobs must pass before a PR can be merged into main or release/v3.

name: CI

on:
  push:
    branches: [main, "release/v3", dev]
  pull_request:
    branches: [main, "release/v3", dev]

# Cancel in-progress runs for the same branch when a newer commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 — Integrity checks (fast gate, no matrix)
  # ---------------------------------------------------------------------------
  integrity:
    name: Integrity checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: No print() in engine modules
        # Checks only actual code lines (^\s*print) — skips comments and docstrings.
        # logger.py is excluded — it is the centralised log emitter and is
        # permitted to call print() by design (INVARIANTS.md §12).
        run: |
          echo "Scanning engine modules for print() calls..."
          VIOLATIONS=$(grep -rn "^\s*print(" \
            scanner.py \
            duplicates.py \
            rules.py \
            organizer.py \
            analyzer.py \
            config.py \
            destination_map.py \
            planner.py \
            batch_engine.py \
            action_controller.py \
            file_operation_manager.py \
            trash_manager.py \
            timer.py \
            policy.py \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "FAIL: print() found in engine module(s):"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK — no print() calls in engine modules."

      - name: No circular imports
        # Import main.py — if the import graph is broken, Python will raise ImportError.
        run: |
          echo "Checking import graph..."
          python3 -c "import main" && echo "OK — import graph is clean."

      - name: Version string consistency
        # version.py must match the most recent entry in CHANGELOG.md.
        # Regex handles optional type annotation: VERSION: str = "x.y.z"
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          version_py = Path("version.py").read_text()
          m = re.search(r'VERSION.*=\s*"([^"]+)"', version_py)
          if not m:
              print("FAIL: VERSION not found in version.py")
              sys.exit(1)
          declared = m.group(1)

          changelog = Path("CHANGELOG.md").read_text()
          m2 = re.search(r"##\s*\[([^\]]+)\]", changelog)
          if not m2:
              print("FAIL: No version header found in CHANGELOG.md")
              sys.exit(1)
          latest = m2.group(1)

          if declared != latest:
              print(f"FAIL: version.py says {declared!r} but CHANGELOG.md says {latest!r}")
              sys.exit(1)

          print(f"OK — version {declared!r} consistent across version.py and CHANGELOG.md")
          EOF

      - name: LICENSE file present
        run: |
          if [ ! -f LICENSE ]; then
            echo "FAIL: LICENSE file is missing."
            exit 1
          fi
          echo "OK — LICENSE file present."

  # ---------------------------------------------------------------------------
  # Job 2 — Full test suite (matrix: Python 3.10 / 3.11 / 3.12)
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: integrity

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run full test suite
        # Discovers tests in both root (test_safe_actions.py) and tests/ subfolder.
        run: |
          python3 -m unittest discover -s . -p "test_*.py" -v
          python3 -m unittest discover -s tests -p "test_*.py" -v

      - name: Confirm 838 tests ran
        # Counts tests from both discovery locations and sums them.
        run: |
          python3 - <<'EOF'
          import subprocess, sys, re

          total = 0
          for start in [".", "tests"]:
              result = subprocess.run(
                  ["python3", "-m", "unittest", "discover",
                   "-s", start, "-p", "test_*.py"],
                  capture_output=True, text=True
              )
              output = result.stderr + result.stdout
              m = re.search(r"Ran (\d+) test", output)
              if m:
                  total += int(m.group(1))

          expected = 838
          if total < expected:
              print(f"FAIL: Expected {expected} tests, but only {total} ran.")
              print("Was a test file accidentally excluded from discovery?")
              sys.exit(1)

          print(f"OK — {total} tests ran (expected {expected}).")
          EOF

  # ---------------------------------------------------------------------------
  # Job 3 — Stress tests (100K files — expensive, main and dev only)
  # ---------------------------------------------------------------------------
  stress:
    name: Stress test (100K files)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run memory stress test at 100K files
        timeout-minutes: 10
        run: |
          CS_STRESS_FILES=100000 python3 -m unittest tests/test_memory.py -v
